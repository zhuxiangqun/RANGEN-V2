# 分层架构生产环境配置

# 系统基本配置
system:
  name: "LayeredArchitectureSystem"
  version: "1.0.0"
  environment: "production"
  debug: false
  log_level: "INFO"

# 工作流引擎配置
workflow:
  engine: "auto"  # auto, langgraph, simplified, basic
  timeout: 300    # 全局超时时间（秒）
  max_concurrent_queries: 10  # 最大并发查询数
  enable_caching: true
  cache_ttl: 3600  # 缓存过期时间（秒）

# 组件配置
components:
  strategic_agent:
    enabled: true
    timeout: 15
    max_complexity_score: 5.0

  tactical_optimizer:
    enabled: true
    timeout: 10
    ml_optimizer_enabled: true
    rl_optimizer_enabled: true

  execution_coordinator:
    enabled: true
    timeout: 60
    max_parallel_tasks: 5
    retry_attempts: 3
    enable_health_checks: true

# 实时数据集成配置
realtime_data_integration:
  enabled: true
  cache_ttl: 3600  # 缓存过期时间（秒）
  max_concurrent_requests: 5
  data_sources:
    ctbuh:
      enabled: true
      base_url: "https://skyscrapercenter.com/api/v1"
      timeout: 30
      rate_limit: 100  # 每分钟请求数
      confidence_weight: 0.9  # 权威数据源权重
    google_open_buildings:
      enabled: false  # 主要用于批量数据处理
      data_url: "https://sites.research.google/open-buildings/"
    microsoft_buildings:
      enabled: false
    openstreetmap:
      enabled: false

# 多地域数据集成配置
regional_data_integration:
  enabled: true
  regions:
    - "north_america"
    - "south_america"
    - "europe"
    - "africa"
    - "asia"
    - "middle_east"
    - "oceania"
    - "central_america"
    - "caribbean"
  max_buildings_per_region: 100
  refresh_interval_hours: 24
  min_confidence_threshold: 0.5

# 数值精确度处理配置
numeric_precision:
  enabled: true
  precision_threshold: 0.01
  max_decimal_places: 3
  auto_unit_conversion: true
  preserve_original_values: true
  rounding_mode: "ROUND_HALF_UP"
  confidence_thresholds:
    exact: 0.95
    approximate: 0.7
    low_confidence: 0.5

# 数据质量验证配置
data_quality:
  enabled: true
  monitoring_interval_minutes: 60
  data_freshness_hours: 24
  alert_thresholds:
    min_overall_score: 0.7
    max_critical_issues: 5
    max_outdated_ratio: 0.2
  quality_thresholds:
    min_completeness: 0.8
    min_accuracy: 0.85
    min_consistency: 0.9
    min_timeliness: 0.7
    min_regional_balance: 0.6
  auto_fix:
    enabled: true
    duplicate_removal: true
    unit_standardization: true
    confidence_boosting: false

# 执行器配置
executors:
  registry_type: "enhanced"  # enhanced, basic
  health_check_interval: 60  # 健康检查间隔（秒）
  max_retry_attempts: 3
  default_timeout: 30

  # 内置执行器配置
  built_in_executors:
    knowledge_retrieval:
      enabled: true
      timeout: 30
      max_concurrent: 3
      retry_count: 2

    reasoning:
      enabled: true
      timeout: 120
      max_concurrent: 2
      retry_count: 1

    answer_generation:
      enabled: true
      timeout: 60
      max_concurrent: 2
      retry_count: 1

    citation:
      enabled: true
      timeout: 15
      max_concurrent: 5
      retry_count: 3

    analysis:
      enabled: true
      timeout: 45
      max_concurrent: 2
      retry_count: 1

# 监控配置
monitoring:
  enabled: true
  metrics_interval: 30  # 指标收集间隔（秒）
  health_check_enabled: true
  performance_tracking: true

  # 指标存储
  metrics_storage:
    type: "memory"  # memory, file, redis
    file_path: "logs/metrics.json"
    retention_days: 7

  # 告警配置
  alerts:
    enabled: true
    error_rate_threshold: 0.1  # 错误率阈值
    response_time_threshold: 30  # 响应时间阈值（秒）
    alert_channels: ["log", "console"]  # log, console, email, webhook

# 日志配置
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file_logging:
    enabled: true
    log_dir: "logs"
    max_file_size: "10MB"
    backup_count: 5

  # 结构化日志
  structured_logging:
    enabled: true
    include_trace_id: true
    include_request_id: true

# 性能配置
performance:
  optimization_enabled: true

  # 资源限制
  resource_limits:
    max_memory_usage: "1GB"
    max_cpu_usage: 80  # 百分比

  # 缓存配置
  caching:
    enabled: true
    strategy: "lru"  # lru, ttl, size
    max_size: 1000   # 最大缓存条目数
    ttl: 3600        # 默认TTL（秒）

  # 异步处理
  async_processing:
    enabled: true
    thread_pool_size: 4
    max_queue_size: 100

# 安全配置
security:
  input_validation:
    enabled: true
    max_query_length: 10000
    allowed_chars: "all"  # all, alphanumeric, safe

  rate_limiting:
    enabled: true
    requests_per_minute: 60
    burst_limit: 10

  # API密钥（生产环境应从环境变量获取）
  api_keys: []

# 部署配置
deployment:
  service_name: "layered-architecture-service"
  port: 8080
  host: "0.0.0.0"

  # 健康检查端点
  health_check:
    enabled: true
    path: "/health"
    interval: 30

  # 指标端点
  metrics_endpoint:
    enabled: true
    path: "/metrics"
    auth_required: false

# 检索策略配置（P0阶段：HyDE支持）
retrieval_strategies:
  # 查询编排器配置
  query_orchestrator:
    enabled: true
    enable_strategy_selection: true
    default_strategy: "simple"
    simple_to_hyde_threshold: 0.3
    hyde_to_cot_threshold: 1.3
  
  # HyDE策略配置
  hyde:
    enabled: true
    max_hypothetical_tokens: 300
    temperature: 0.3
    top_k: 5
    force_rerank: true
    context_expansion_beta_threshold: 1.3
    hypothetical_prompt_template: |
      请根据以下问题，写一个详细的答案段落。这个答案应该像是百科全书或教科书中的条目，包含准确的事实信息。
      
      问题：{query}
      
      答案：
  
  # 简单策略配置（基线）
  simple:
    enabled: true
    top_k: 5
    use_rerank: true

# 第三方集成
integrations:
  langgraph:
    enabled: true
    fallback_on_error: true

  opentelemetry:
    enabled: true
    service_name: "layered-architecture"
    endpoint: "http://localhost:4317"  # OTLP端点

  # 外部服务
  external_services:
    knowledge_base:
      enabled: true
      url: "http://localhost:8081"
      timeout: 10

    llm_service:
      enabled: true
      url: "http://localhost:8082"
      timeout: 30
      model: "gpt-3.5-turbo"

# 环境变量映射
environment_variables:
  # 数据库配置
  DATABASE_URL: "database.url"
  DATABASE_POOL_SIZE: "database.pool_size"

  # API密钥
  OPENAI_API_KEY: "integrations.llm_service.api_key"
  LANGGRAPH_API_KEY: "integrations.langgraph.api_key"

  # 监控配置
  OTEL_ENDPOINT: "integrations.opentelemetry.endpoint"
  LOG_LEVEL: "logging.level"

  # 性能配置
  MAX_MEMORY: "performance.resource_limits.max_memory_usage"
  MAX_CPU: "performance.resource_limits.max_cpu_usage"
