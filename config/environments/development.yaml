# RANGEN Development Configuration
# =================================
# Lightweight config for local development

system:
  name: "RANGEN V2"
  version: "2.0.0"
  environment: "development"
  debug: true
  log_level: "DEBUG"

llm:
  provider: "deepseek"
  deepseek:
    api_key: "${DEEPSEEK_API_KEY:}"
    base_url: "https://api.deepseek.com/v1"
    reasoning_model: "deepseek-reasoner"
    validation_model: "deepseek-chat"
    citation_model: "deepseek-chat"
    fallback_model: "deepseek-chat"

knowledge_base:
  vector_store_path: "./data/vector_store_dev"
  embedding_model: "all-mpnet-base-v2"
  local_embedding_model: "all-MiniLM-L6-v2"
  model_cache:
    cache_dir: "~/.cache/huggingface/hub"
    use_local_models: true
    auto_download: true

kms:
  enabled: true
  config_path: "knowledge_management_system/config/system_config.json"
  service:
    host: "localhost"
    port: 8001
    timeout: 30
    retry_attempts: 3
  features:
    vector_rerank: true
    small_to_big_retrieval: true
    knowledge_graph: true
    multi_modal: false
  performance:
    default_top_k: 15
    similarity_threshold: 0.6
    max_content_length: 2000000

neural_models:
  embedding:
    primary_model: "all-mpnet-base-v2"
    secondary_model: "all-MiniLM-L6-v2"
    model_path: "${MODEL_CACHE_DIR:~/.cache/huggingface/hub}"
  cross_encoder:
    model_name: "cross-encoder/ms-marco-MiniLM-L-6-v2"
    enabled: true

agents:
  reasoning_agent:
    enabled: true
    llm_provider: "deepseek"
    model: "deepseek-reasoner"
    timeout: 60
    max_tokens: 8192
  validation_agent:
    enabled: true
    llm_provider: "deepseek"
    model: "deepseek-chat"
    timeout: 30
  citation_agent:
    enabled: true
    llm_provider: "deepseek"
    model: "deepseek-chat"
    timeout: 15

performance:
  max_concurrent_tasks: 5
  task_timeout: 180
  memory_limit: "1024MB"
  cache:
    deduplication_window: 60
    long_term_cache_window: 300

retrieval:
  max_query_length: 1000
  top_k_results: 5
  enable_reranking: true
  rerank_top_k: 10
  enable_context_expansion: true
  context_expansion_threshold: 1.3

security:
  input_validation:
    enabled: true
    max_query_length: 10000
  rate_limiting:
    enabled: true
    requests_per_minute: 60

monitoring:
  enabled: true
  metrics_interval: 30
  health_check_enabled: true
  performance_tracking: true

integrations:
  langgraph:
    enabled: true
    fallback_on_error: true
  opentelemetry:
    enabled: false
    service_name: "rangen-v2-dev"
    endpoint: "http://localhost:4317"
  mcp:
    enabled: true
    log_level: "INFO"
    server:
      main:
        enabled: true
        name: "rangen-tools"
        description: "RANGEN Internal Tools MCP Server"
        transport: "stdio"
        stdio:
          command: "python -m src.agents.tools.mcp_server"
        http:
          enabled: true
          host: "0.0.0.0"
          port: 8080
      local_demo:
        enabled: true
        name: "local-tools"
        description: "Local Demo Tools MCP Server"
        transport: "stdio"
        stdio:
          command: "python -m src.agents.tools.mcp_local_server"
    client:
      default_transport: "stdio"
      timeout: 30
      servers:
        - name: "rangen-tools"
          description: "RANGEN Internal Tools"
          transport: "stdio"
          server_url: "python -m src.agents.tools.mcp_server"
          auto_connect: true
        - name: "local-demo"
          description: "Local Demo Tools"
          transport: "stdio"
          server_url: "python -m src.agents.tools.mcp_local_server"
          auto_connect: false
    integration:
      auto_start_servers: true
      auto_register_tools: true
      enable_context_protocol: true
