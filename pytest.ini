[pytest]
# Pytest 配置文件
# 优化中断处理，确保 Ctrl-C 能够快速退出

# 测试发现模式
testpaths = tests

# Python 文件模式
python_files = test_*.py

# Python 类模式
python_classes = Test*

# Python 函数模式
python_functions = test_*

# 异步测试配置
asyncio_mode = auto

# 超时配置（如果安装了 pytest-timeout）
# timeout = 600

# 输出选项
addopts = 
    -v
    --tb=short
    --strict-markers
    -W ignore::DeprecationWarning:importlib._bootstrap
    -W ignore::DeprecationWarning:importlib

# 标记定义
markers =
    asyncio: 异步测试标记
    slow: 慢速测试（可能需要较长时间）
    integration: 集成测试
    unit: 单元测试

