author: rangen
config:
  domain: rag
  mode: assistive
  type: retrieval
dependencies: []
description: RAG检索优化技能。从知识库中检索相关信息，包括向量检索、关键词检索、混合检索策略。
name: rag-retrieval
prompt_template: "## RAG检索技能\n\n从知识库中检索相关信息用于回答用户问题。\n\n### 检索策略\n\n**1. 向量检索**\n\
  - 使用语义相似度匹配\n- 适用于概念理解\n- 阈值：0.7-0.85\n\n**2. 关键词检索**\n- 精确匹配关键词\n- 适用于专有名词、术语\n\
  - 用于过滤或补充\n\n**3. 混合检索**\n- 向量 + 关键词组合\n- RRF融合排序\n- 平衡召回率和精确率\n\n### 检索流程\n\n1.\
  \ **查询理解**\n   - 提取核心实体\n   - 识别查询意图\n   - 扩展相关术语\n\n2. **检索执行**\n   - 选择合适的检索策略\n\
  \   - 设置检索数量(通常5-15条)\n   - 应用过滤条件\n\n3. **结果处理**\n   - 相关性排序\n   - 去重处理\n   - 片段拼接\n\
  \n### 常见问题处理\n\n| 问题 | 解决方案 |\n|------|---------|\n| 召回太低 | 降低阈值，添加同义词 |\n| 精确太低\
  \ | 提高阈值，增加关键词过滤 |\n| 无结果 | 扩展查询，尝试不同表述 |\n| 结果重复 | 去重，RRF融合 |\n\n### 检索质量指标\n\n\
  - Hit Rate @K: 前K个结果包含相关信息\n- MRR: 平均倒数排名\n- NDCG: 归一化折损累积增益\n"
related_skills:
