author: rangen
config:
  domain: system
  mode: assistive
  type: optimization
dependencies: []
description: 性能优化技能。识别性能瓶颈，优化检索速度、减少延迟、提升吞吐量。
name: performance-optimization
prompt_template: "## 性能优化技能\n\n识别和解决系统性能瓶颈。\n\n### 性能指标\n\n| 指标 | 目标 | 监控 |\n|------|------|------|\n\
  | 延迟 P99 | < 2s | 95%请求 |\n| 吞吐量 | > 10 QPS | 持续 |\n| 错误率 | < 1% | 稳定 |\n| 资源使用\
  \ | < 80% | CPU/内存 |\n\n### 优化领域\n\n**1. RAG检索优化**\n- 向量索引优化\n- 批量检索\n- 结果缓存\n-\
  \ 近似算法\n\n**2. LLM调用优化**\n- 流式响应\n- 缓存响应\n- 批量请求\n- 模型选择\n\n**3. 系统优化**\n- 连接池\n\
  - 异步IO\n- 并发控制\n- 资源限制\n\n### 优化策略\n\n**缓存策略**\n| 数据类型 | 缓存时间 | 淘汰策略 |\n|---------|---------|---------|\n\
  | 检索结果 | 5-15分钟 | LRU |\n| LLM响应 | 1-24小时 | TTL |\n| 静态数据 | 长期 | 主动刷新 |\n\n**并发控制**\n\
  - 信号量限制并发\n- 队列缓冲请求\n- 熔断防止雪崩\n\n### 性能排查流程\n\n1. **监控发现**\n   - 延迟升高\n   - 错误增加\n\
  \   - 资源告警\n\n2. **分析定位**\n   - 链路追踪\n   - 日志分析\n   - 指标对比\n\n3. **优化实施**\n   -\
  \ 缓存\n   - 异步\n   - 索引\n\n4. **验证效果**\n   - 指标对比\n   - A/B测试\n\n### 常见问题与解决\n\n\
  | 问题 | 原因 | 解决方案 |\n|------|------|---------|\n| 检索慢 | 索引未优化 | 优化向量索引 |\n| LLM慢\
  \ | 网络/模型 | 缓存/流式 |\n| OOM | 内存泄漏 | 限制并发 |\n| 超时 | 资源不足 | 扩容/优化 |\n"
related_skills:
- rag-retrieval
- error-handling
scope: bundled
tags:
- performance
- optimization
- latency
- throughput
tools:
- description: 分析性能瓶颈
  name: analyze_performance
- description: 优化检索性能
  name: optimize_retrieval
- description: 优化缓存策略
  name: optimize_cache
triggers:
- performance
- 性能
- 优化
- 速度
