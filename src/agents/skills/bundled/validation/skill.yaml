author: rangen
config:
  domain: quality
  mode: evaluative
  type: validation
dependencies: []
description: 输入输出验证技能。验证用户输入、Agent输出、数据格式，确保系统可靠性。
name: validation
prompt_template: "## 输入输出验证技能\n\n验证用户输入、Agent输出、数据格式。\n\n### 验证类型\n\n**1. 输入验证**\n\
  - 用户查询格式\n- 参数合法性\n- 安全检查\n\n**2. 输出验证**\n- 格式正确性\n- 内容完整性\n- 引用有效性\n\n**3. 数据验证**\n\
  - 类型检查\n- 范围检查\n- 约束检查\n\n### 验证规则\n\n| 类型 | 检查项 | 处理方式 |\n|------|-------|---------|\n\
  | 必填 | 字段是否存在 | 拒绝请求 |\n| 格式 | 正则/类型匹配 | 提示修正 |\n| 范围 | 数值/长度限制 | 截断或拒绝 |\n| 语义\
  \ | 业务逻辑 | 业务错误 |\n| 安全 | XSS/SQL注入 | 过滤或拒绝 |\n\n### 验证流程\n\n**输入验证**\n1. 解析输入数据\n\
  2. 应用验证规则\n3. 返回验证结果\n4. 错误提示具体\n\n**输出验证**\n1. 检查输出格式\n2. 验证内容完整性\n3. 检查引用有效性\n\
  4. 标记潜在问题\n\n### 常见验证模式\n\n```python\n# 必填检查\nif not field:\n    raise ValidationError(\"\
  字段必填\")\n\n# 格式检查\nif not re.match(pattern, value):\n    raise ValidationError(\"\
  格式错误\")\n\n# 范围检查\nif not min <= value <= max:\n    raise ValidationError(\"超出范围\"\
  )\n\n# 业务规则\nif not business_rule(value):\n    raise ValidationError(\"不满足业务规则\"\
  )\n```\n\n### 验证最佳实践\n\n1. 尽早验证（Fail Fast）\n2. 清晰错误信息\n3. 验证与业务分离\n4. 日志记录验证失败\n"
related_skills:
- quality-control
- error-handling
scope: bundled
tags:
- validation
- input
- output
- checking
tools:
- description: 验证输入数据
  name: validate_input
- description: 验证输出数据
  name: validate_output
- description: 验证数据格式
  name: validate_format
triggers:
- validation
- 验证
- 检查
- 校验
version: 1.0.0
