author: rangen
config:
  domain: system
  mode: assistive
  type: management
dependencies:
- validation
description: 错误处理技能。系统错误处理、异常捕获、错误恢复、降级策略。
name: error-handling
prompt_template: "## 错误处理技能\n\n系统错误处理、异常捕获、错误恢复。\n\n### 错误分类\n\n**1. 可恢复错误**\n- 网络超时:\
  \ 重试\n- 临时不可用: 等待后重试\n- 资源不足: 等待后重试\n\n**2. 不可恢复错误**\n- 认证失败: 提示用户\n- 权限不足: 拒绝请求\n\
  - 格式错误: 返回修正提示\n\n**3. 系统错误**\n- 内存溢出: 清理资源\n- 死循环: 中断执行\n- 崩溃: 记录日志，重启\n\n### 错误处理策略\n\
  \n**重试机制**\n| 错误类型 | 重试次数 | 退避策略 |\n|---------|---------|---------|\n| 网络超时 | 3次\
  \ | 指数退避 |\n| 临时不可用 | 2次 | 固定延迟 |\n| 限流 | 5次 | 线性退避 |\n\n**降级处理**\n- 主服务不可用: 使用备用\n\
  - 外部API失败: 返回缓存\n- 复杂计算: 简化处理\n\n**错误传播**\n- 底层错误: 转换为用户友好\n- 敏感信息: 脱敏处理\n- 堆栈信息:\
  \ 仅开发环境显示\n\n### 错误响应格式\n\n```json\n{\n  \"success\": false,\n  \"error\": {\n \
  \   \"code\": \"ERROR_CODE\",\n    \"message\": \"用户友好的错误信息\",\n    \"details\"\
  : \"技术细节（仅开发环境）\",\n    \"recoverable\": true/false,\n    \"retry_after\": 5\n \
  \ }\n}\n```\n\n### 日志规范\n\n| 级别 | 使用场景 |\n|------|---------|\n| DEBUG | 调试信息 |\n\
  | INFO | 正常流程 |\n| WARNING | 异常但可处理 |\n| ERROR | 错误需关注 |\n| CRITICAL | 系统级错误 |\n\
  \n### 最佳实践\n\n1. 区分用户错误和系统错误\n2. 提供清晰的错误信息\n3. 记录足够的上下文\n4. 有恢复方案\n"
related_skills:
- validation
- tool-execution
scope: bundled
tags:
- error
- exception
- recovery
- handling
tools:
- description: 处理错误
  name: handle_error
- description: 重试操作
  name: retry_operation
- description: 降级处理
  name: degrade_gracefully
triggers:
- error
- 错误
- 异常
- 处理
- recovery
version: 1.0.0
