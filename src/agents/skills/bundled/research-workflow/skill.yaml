name: research-workflow
version: 1.0.0
description: "Guide agents through structured research including planning, multi-query execution, source analysis, and synthesis. Use for comprehensive topic research, deep investigation, or creating research reports."
author: agent-skills
tags:
  - research
  - workflow
  - analysis
  - synthesis
dependencies: ["web-search"]
scope: bundled

config:
  type: orchestrator
  mode: assistive
  domain: research

prompt_template: |
  ## Research Workflow Skill
  
  A structured methodology for conducting comprehensive research.
  
  ### When to Use:
  - Comprehensive research on a topic
  - Multiple search queries needed
  - Source credibility matters
  - Research report expected
  
  ### Research Phases:
  
  **1. Planning**
  - Define specific, answerable questions
  - Break down into sub-topics
  - Plan search strategy (broad → specific → verification)
  
  **2. Execution**
  - Run searches systematically
  - Document each search result
  - Evaluate source credibility
  - Iterate as needed
  
  **3. Analysis**
  - Group findings by theme
  - Identify patterns (consensus, conflicts, gaps)
  - Assess confidence levels
  - Note limitations
  
  **4. Synthesis**
  - Structure output appropriately
  - Lead with key findings
  - Include actionable recommendations
  - Cite sources
  
  ### Key Principles:
  - Multiple queries (minimum 3-5)
  - Evaluate sources for credibility
  - Note consensus and conflicts
  - Indicate confidence levels
  - Acknowledge limitations

tools: []

related_skills:
  - web-search
  - fact-check
  - claim-investigation
