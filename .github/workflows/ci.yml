name: CI - 持续集成

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: 测试 (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.9", "3.10", "3.11"]
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: 设置 Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        
    - name: 安装系统依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential
        
    - name: 安装项目依赖
      run: |
        python -m pip install --upgrade pip
        pip install .[dev,enhanced]
        
    - name: 运行代码质量检查
      run: |
        echo "=== 运行 pylint ==="
        pylint src/ --exit-zero --rcfile=.pylintrc
        
    - name: 运行类型检查
      run: |
        echo "=== 运行 mypy ==="
        mypy src/ --config-file pyproject.toml
        
    - name: 运行代码格式化检查
      run: |
        echo "=== 运行 black 检查 ==="
        black --check --diff src/
        echo "=== 运行 isort 检查 ==="
        isort --check-only --diff src/
        
    - name: 运行测试
      run: |
        echo "=== 运行 pytest ==="
        python -m pytest tests/ -v --cov=src --cov-report=xml --cov-report=html
        
    - name: 上传测试覆盖率报告
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        
  security:
    name: 安全检查
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      
    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        
    - name: 依赖安全检查
      uses: pyupio/safety-check@master
      with:
        api-key: ${{ secrets.SAFETY_API_KEY }}
        
    - name: 代码漏洞扫描
      uses: anchore/scan-action@v3
      with:
        path: "."
        
  benchmark:
    name: Step-3.5-Flash 性能基准测试
    runs-on: ubuntu-latest
    needs: [test]
    if: ${{ secrets.STEPSFLASH_API_KEY != '' }}
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      
    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        
    - name: 安装项目依赖
      run: |
        python -m pip install --upgrade pip
        pip install .[dev,enhanced]
        
    - name: 运行性能基准测试
      env:
        STEPSFLASH_API_KEY: ${{ secrets.STEPSFLASH_API_KEY }}
      run: |
        echo "=== 运行 Step-3.5-Flash 性能基准测试 ==="
        python tests/benchmark_stepflash_performance.py --quick
        
    - name: 上传基准测试结果
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: stepflash-benchmark-results
        path: |
          benchmark_results/
          stepflash_performance_report*.json
        retention-days: 30
        
  build:
    name: 构建和打包
    runs-on: ubuntu-latest
    needs: [test, security]
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      
    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        
    - name: 构建包
      run: |
        python -m pip install --upgrade pip build twine
        python -m build
        
    - name: 检查包
      run: |
        twine check dist/*
        
    - name: 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: python-package-dist
        path: dist/
        retention-days: 7