version: '3.8'

services:
  rangen-api:
    image: rangen-system:latest
    container_name: rangen-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
    volumes:
      - ./config:/app/config
      - ./logs:/app/logs
    depends_on:
      - postgres
      - redis
    networks:
      - rangen-network

  rangen-worker:
    image: rangen-system:latest
    container_name: rangen-worker
    restart: unless-stopped
    command: ["python", "-m", "src.worker"]
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
    volumes:
      - ./config:/app/config
      - ./logs:/app/logs
    depends_on:
      - postgres
      - redis
    networks:
      - rangen-network

  postgres:
    image: postgres:13
    container_name: rangen-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=rangen_production
      - POSTGRES_USER=rangen_user
      - POSTGRES_PASSWORD=YOUR_DB_PASSWORD
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rangen-network

  redis:
    image: redis:6-alpine
    container_name: rangen-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - rangen-network

  nginx:
    image: nginx:alpine
    container_name: rangen-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - rangen-api
    networks:
      - rangen-network

volumes:
  postgres_data:
  redis_data:

networks:
  rangen-network:
    driver: bridge
