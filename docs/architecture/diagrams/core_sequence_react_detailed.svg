<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="1400" viewBox="0 0 2200 1400">
<defs>
  <style>
    .box{fill:#f8fafc;stroke:#334155;stroke-width:2}
    .lifeline{stroke:#94a3b8;stroke-width:2;stroke-dasharray:6,6}
    .title{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC','Noto Sans','Arial',sans-serif;font-size:24px;fill:#000000}
    .label{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC','Noto Sans','Arial',sans-serif;font-size:18px;fill:#000000}
    .arrow{stroke:#334155;stroke-width:2;fill:none}
    .arrow-dashed{stroke:#64748b;stroke-width:2;fill:none;stroke-dasharray:8,8}
    .fragment{fill:#eef2ff;stroke:#334155;stroke-width:2}
    .activation{fill:#e2e8f0;stroke:#334155;stroke-width:2}
    .caption{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC','Noto Sans','Arial',sans-serif;font-size:16px;fill:#334155}
  </style>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
    <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
  </marker>
</defs>

<!-- Participants -->
<rect x="60" y="40" width="200" height="60" class="box"/>
<text x="160" y="78" text-anchor="middle" class="title">Client/API</text>
<line x1="160" y1="100" x2="160" y2="1330" class="lifeline"/>

<rect x="320" y="40" width="240" height="60" class="box"/>
<text x="440" y="78" text-anchor="middle" class="title">Configurable Router</text>
<line x1="440" y1="100" x2="440" y2="1330" class="lifeline"/>

<rect x="620" y="40" width="220" height="60" class="box"/>
<text x="730" y="78" text-anchor="middle" class="title">ContextManager</text>
<line x1="730" y1="100" x2="730" y2="1330" class="lifeline"/>

<rect x="900" y="40" width="220" height="60" class="box"/>
<text x="1010" y="78" text-anchor="middle" class="title">ReAct Agent</text>
<line x1="1010" y1="100" x2="1010" y2="1330" class="lifeline"/>

<rect x="1180" y="40" width="240" height="60" class="box"/>
<text x="1300" y="78" text-anchor="middle" class="title">ExecutionCoordinator</text>
<line x1="1300" y1="100" x2="1300" y2="1330" class="lifeline"/>

<rect x="1460" y="40" width="220" height="60" class="box"/>
<text x="1570" y="78" text-anchor="middle" class="title">ToolRegistry</text>
<line x1="1570" y1="100" x2="1570" y2="1330" class="lifeline"/>

<rect x="1720" y="40" width="200" height="60" class="box"/>
<text x="1820" y="78" text-anchor="middle" class="title">KMS API</text>
<line x1="1820" y1="100" x2="1820" y2="1330" class="lifeline"/>

<rect x="1960" y="40" width="200" height="60" class="box"/>
<text x="2060" y="78" text-anchor="middle" class="title">Perf/Error</text>
<line x1="2060" y1="100" x2="2060" y2="1330" class="lifeline"/>

<!-- Timeline captions -->
<text x="60" y="120" class="caption">时间轴（从上到下）</text>

<!-- Cache check -->
<text x="160" y="160" class="label">请求: POST {query, session_id}</text>
<line x1="160" y1="170" x2="440" y2="170" class="arrow" marker-end="url(#arrow)"/>

<text x="440" y="200" class="label">检查缓存</text>
<line x1="440" y1="210" x2="730" y2="210" class="arrow" marker-end="url(#arrow)"/>

<rect x="710" y="210" width="40" height="120" class="activation"/>
<text x="730" y="250" text-anchor="middle" class="caption">get_cache</text>
<line x1="730" y1="330" x2="440" y2="330" class="arrow-dashed" marker-end="url(#arrow)"/>
<text x="540" y="320" class="label">命中/未命中</text>

<!-- Alt fragment: cache hit/miss -->
<rect x="300" y="340" width="1680" height="160" class="fragment"/>
<text x="310" y="360" class="label">alt 缓存命中</text>
<text x="310" y="500" class="label">else 缓存未命中</text>

<!-- Cache hit branch -->
<text x="440" y="380" class="label">直接返回缓存答案</text>
<line x1="440" y1="390" x2="160" y2="390" class="arrow-dashed" marker-end="url(#arrow)"/>

<!-- Cache miss branch -->
<text x="440" y="520" class="label">启动 ReAct 处理</text>
<line x1="440" y1="530" x2="1010" y2="530" class="arrow" marker-end="url(#arrow)"/>

<!-- Setup tools -->
<text x="1010" y="560" class="label">初始化与工具设置</text>
<line x1="1010" y1="570" x2="1300" y2="570" class="arrow" marker-end="url(#arrow)"/>
<rect x="1280" y="570" width="40" height="100" class="activation"/>
<text x="1300" y="610" text-anchor="middle" class="caption">setup_tools</text>
<line x1="1300" y1="670" x2="1010" y2="670" class="arrow-dashed" marker-end="url(#arrow)"/>

<!-- Loop fragment for ReAct iterations -->
<rect x="880" y="700" width="1120" height="360" class="fragment"/>
<text x="890" y="720" class="label">loop ReAct循环（最多N次）</text>

<!-- Think -->
<text x="1010" y="760" class="label">Think: 评估问题与计划</text>
<rect x="990" y="770" width="40" height="80" class="activation"/>

<!-- Act: call tool via ExecCoord -->
<text x="1010" y="860" class="label">Act: 执行计划（检索/计算等）</text>
<line x1="1010" y1="870" x2="1300" y2="870" class="arrow" marker-end="url(#arrow)"/>
<rect x="1280" y="870" width="40" height="120" class="activation"/>
<text x="1300" y="905" text-anchor="middle" class="caption">execute()</text>
<line x1="1300" y1="920" x2="1570" y2="920" class="arrow" marker-end="url(#arrow)"/>
<rect x="1550" y="920" width="40" height="120" class="activation"/>
<text x="1570" y="955" text-anchor="middle" class="caption">call_tool()</text>
<line x1="1570" y1="960" x2="1820" y2="960" class="arrow" marker-end="url(#arrow)"/>
<rect x="1800" y="960" width="40" height="120" class="activation"/>
<text x="1820" y="995" text-anchor="middle" class="caption">search()</text>

<!-- Tool/KMS return -->
<line x1="1820" y1="1080" x2="1570" y2="1080" class="arrow-dashed" marker-end="url(#arrow)"/>
<text x="1680" y="1070" class="label">返回检索/计算结果</text>
<line x1="1570" y1="1100" x2="1300" y2="1100" class="arrow-dashed" marker-end="url(#arrow)"/>
<line x1="1300" y1="1120" x2="1010" y2="1120" class="arrow-dashed" marker-end="url(#arrow)"/>

<!-- Observe -->
<text x="1010" y="1150" class="label">Observe: 观察结果，评估是否完成</text>

<!-- Post-loop: save & return -->
<text x="1010" y="1200" class="label">生成最终答案与引用</text>
<line x1="1010" y1="1210" x2="730" y2="1210" class="arrow" marker-end="url(#arrow)"/>
<rect x="710" y="1210" width="40" height="80" class="activation"/>
<text x="730" y="1240" text-anchor="middle" class="caption">set_cache()</text>
<line x1="1010" y1="1290" x2="440" y2="1290" class="arrow-dashed" marker-end="url(#arrow)"/>
<line x1="440" y1="1310" x2="160" y2="1310" class="arrow-dashed" marker-end="url(#arrow)"/>

<!-- Notes: monitoring and error handling -->
<text x="2060" y="300" text-anchor="middle" class="caption">PerformanceMonitor 全程监控</text>
<text x="2060" y="330" text-anchor="middle" class="caption">ErrorHandler 捕获异常并降级/重试</text>
<line x1="2060" y1="350" x2="1300" y2="870" class="arrow-dashed" marker-end="url(#arrow)"/>
<line x1="2060" y1="370" x2="1570" y2="920" class="arrow-dashed" marker-end="url(#arrow)"/>

<!-- Validation failure feedback to retry -->
<text x="1460" y="800" class="caption">验证失败→反馈重试（回到 Act/Tool）</text>
<line x1="1460" y1="810" x2="1570" y2="920" class="arrow-dashed" marker-end="url(#arrow)"/>
</svg>
