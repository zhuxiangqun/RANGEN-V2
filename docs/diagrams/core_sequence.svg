<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1100" viewBox="0 0 1800 1100">
<defs>
  <style>
    .box{fill:#f8fafc;stroke:#334155;stroke-width:2}
    .lifeline{stroke:#94a3b8;stroke-width:2;stroke-dasharray:6,6}
    .title{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC','Noto Sans','Arial',sans-serif;font-size:22px;fill:#000000}
    .label{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC','Noto Sans','Arial',sans-serif;font-size:18px;fill:#000000}
    .arrow{stroke:#334155;stroke-width:2;fill:none}
    .arrow-red{stroke:#dc2626;stroke-width:2;fill:none}
    .arrow-blue{stroke:#2563eb;stroke-width:2;fill:none}
  </style>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
    <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
  </marker>
  <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
    <path d="M0,0 L8,3 L0,6 Z" fill="#dc2626"/>
  </marker>
  <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
    <path d="M0,0 L8,3 L0,6 Z" fill="#2563eb"/>
  </marker>
</defs>

<rect x="60" y="40" width="180" height="50" class="box"/>
<text x="150" y="70" text-anchor="middle" class="title">Client/API</text>
<line x1="150" y1="95" x2="150" y2="1050" class="lifeline"/>

<rect x="300" y="40" width="220" height="50" class="box"/>
<text x="410" y="70" text-anchor="middle" class="title">策略选择器</text>
<line x1="410" y1="95" x2="410" y2="1050" class="lifeline"/>

<rect x="580" y="40" width="240" height="50" class="box"/>
<text x="700" y="70" text-anchor="middle" class="title">Configurable Router</text>
<line x1="700" y1="95" x2="700" y2="1050" class="lifeline"/>

<rect x="880" y="40" width="220" height="50" class="box"/>
<text x="990" y="70" text-anchor="middle" class="title">ReAct Agent</text>
<line x1="990" y1="95" x2="990" y2="1050" class="lifeline"/>

<rect x="1150" y="40" width="240" height="50" class="box"/>
<text x="1270" y="70" text-anchor="middle" class="title">ExecutionCoordinator</text>
<line x1="1270" y1="95" x2="1270" y2="1050" class="lifeline"/>

<rect x="1450" y="40" width="240" height="50" class="box"/>
<text x="1570" y="70" text-anchor="middle" class="title">ToolRegistry / KMS</text>
<line x1="1570" y1="95" x2="1570" y2="1050" class="lifeline"/>

<text x="150" y="130" class="label">1. 查询</text>
<line x1="150" y1="140" x2="410" y2="140" class="arrow" marker-end="url(#arrow)"/>

<text x="410" y="170" class="label">2. 选择执行路径（ReAct/MAS）</text>
<line x1="410" y1="180" x2="700" y2="180" class="arrow" marker-end="url(#arrow)"/>

<text x="700" y="210" class="label">3a. 路由到 ReAct</text>
<line x1="700" y1="220" x2="990" y2="220" class="arrow" marker-end="url(#arrow)"/>

<text x="700" y="250" class="label">3b. 路由到 MAS（复杂查询）</text>
<line x1="700" y1="260" x2="1270" y2="260" class="arrow" marker-end="url(#arrow)"/>

<rect x="930" y="300" width="120" height="30" class="box"/>
<text x="990" y="320" text-anchor="middle" class="label">Think/Plan</text>

<text x="990" y="360" class="label">4a. 调用工具（检索/推理/生成/引用）</text>
<line x1="990" y1="370" x2="1570" y2="370" class="arrow" marker-end="url(#arrow)"/>

<rect x="1490" y="390" width="160" height="30" class="box"/>
<text x="1570" y="410" text-anchor="middle" class="label">KnowledgeRetrievalTool</text>
<text x="1570" y="445" class="label">→ 调用 KMS（向量检索）</text>
<line x1="1570" y1="455" x2="1570" y2="520" class="arrow" marker-end="url(#arrow)"/>

<rect x="1490" y="520" width="160" height="30" class="box"/>
<text x="1570" y="540" text-anchor="middle" class="label">返回证据集</text>
<line x1="1570" y1="560" x2="990" y2="560" class="arrow" marker-end="url(#arrow)"/>

<text x="990" y="600" class="label">5a. 证据预处理 → 推理 → 抽取 → 验证 → 引用</text>
<line x1="990" y1="610" x2="990" y2="700" class="arrow" marker-end="url(#arrow)"/>

<rect x="930" y="700" width="120" height="30" class="box"/>
<text x="990" y="720" text-anchor="middle" class="label">输出</text>
<line x1="990" y1="740" x2="150" y2="740" class="arrow" marker-end="url(#arrow)"/>

<rect x="1210" y="300" width="120" height="30" class="box"/>
<text x="1270" y="320" text-anchor="middle" class="label">任务分解</text>

<text x="1270" y="360" class="label">4b. 分配到 ExpertAgent 池</text>
<line x1="1270" y1="370" x2="1570" y2="370" class="arrow" marker-end="url(#arrow)"/>

<text x="1570" y="600" class="label">检索/推理/生成/引用 工具调用</text>
<line x1="1570" y1="610" x2="1270" y2="610" class="arrow" marker-end="url(#arrow)"/>

<text x="1270" y="650" class="label">5b. 汇总多专家结果 → 验证 → 引用</text>
<line x1="1270" y1="660" x2="1270" y2="720" class="arrow" marker-end="url(#arrow)"/>

<rect x="1210" y="720" width="120" height="30" class="box"/>
<text x="1270" y="740" text-anchor="middle" class="label">输出</text>
<line x1="1270" y1="760" x2="150" y2="760" class="arrow" marker-end="url(#arrow)"/>

<rect x="300" y="820" width="220" height="40" class="box"/>
<text x="410" y="845" text-anchor="middle" class="label">PerformanceMonitor / ErrorHandler</text>

<rect x="580" y="820" width="240" height="40" class="box"/>
<text x="700" y="845" text-anchor="middle" class="label">ContextManager / CacheManager</text>

<text x="410" y="880" class="label">贯穿监控与错误恢复</text>
<text x="700" y="880" class="label">为检索与推理提供上下文与缓存</text>

<text x="1080" y="820" class="label">验证失败反馈</text>
<line x1="1080" y1="830" x2="1570" y2="540" class="arrow-blue" marker-end="url(#arrow-blue)"/>
<text x="1530" y="510" class="label">反馈到推理/工具</text>

<text x="370" y="930" class="label">性能反馈到策略</text>
<line x1="410" y1="940" x2="410" y2="160" class="arrow-red" marker-end="url(#arrow-red)"/>

<text x="700" y="930" class="label">上下文参与查询阶段</text>
<line x1="700" y1="940" x2="150" y2="140" class="arrow-blue" marker-end="url(#arrow-blue)"/>
</svg>
