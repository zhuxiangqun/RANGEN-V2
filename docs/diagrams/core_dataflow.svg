<line x1="630" y1="590" x2="140" y2="115" class="arrow-blue" marker-end="url(#arrow-blue)"/>
<line x1="630" y1="590" x2="290" y2="250" class="arrow-blue" marker-end="url(#arrow-blue)"/>
</svg>
