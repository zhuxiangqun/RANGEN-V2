<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1000">
<defs>
  <style>
    .box{fill:#f1f5f9;stroke:#334155;stroke-width:2}
    .group{fill:#eef2ff;stroke:#334155;stroke-width:2}
    .title{font-family:Arial, Helvetica, sans-serif;font-size:18px;fill:#0f172a}
    .label{font-family:Arial, Helvetica, sans-serif;font-size:16px;fill:#334155}
    .arrow{stroke:#334155;stroke-width:2;fill:none}
    .dashed{stroke:#334155;stroke-width:2;fill:none;stroke-dasharray:6,6}
    .arrow-red{stroke:#dc2626;stroke-width:2;fill:none}
    .arrow-blue{stroke:#2563eb;stroke-width:2;fill:none}
  </style>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
    <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
  </marker>
  <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
    <path d="M0,0 L8,3 L0,6 Z" fill="#dc2626"/>
  </marker>
  <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
    <path d="M0,0 L8,3 L0,6 Z" fill="#2563eb"/>
  </marker>
</defs>

<rect x="60" y="80" width="160" height="60" class="box"/>
