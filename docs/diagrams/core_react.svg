<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000">
<defs>
  <style>
    .box{fill:#f5f7fa;stroke:#334155;stroke-width:2}
    .title{font-family:Arial, Helvetica, sans-serif;font-size:18px;fill:#0f172a}
    .arrow{stroke:#334155;stroke-width:2;fill:none}
  </style>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
    <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
  </marker>
</defs>

<rect x="50" y="50" width="220" height="60" class="box"/>
<text x="160" y="87" text-anchor="middle" class="title">策略选择器</text>

<rect x="320" y="50" width="220" height="60" class="box"/>
<text x="430" y="87" text-anchor="middle" class="title">ReAct Agent</text>

<rect x="320" y="140" width="300" height="60" class="box"/>
<text x="470" y="177" text-anchor="middle" class="title">Agent 循环: Think→Plan→Act→Observe</text>

<rect x="650" y="50" width="260" height="60" class="box"/>
<text x="780" y="87" text-anchor="middle" class="title">工具层 ToolRegistry</text>

<rect x="650" y="130" width="220" height="50" class="box"/>
<text x="760" y="160" text-anchor="middle" class="title">KnowledgeRetrievalTool</text>

<rect x="650" y="190" width="220" height="50" class="box"/>
<text x="760" y="220" text-anchor="middle" class="title">ReasoningTool</text>

<rect x="650" y="250" width="220" height="50" class="box"/>
<text x="760" y="280" text-anchor="middle" class="title">AnswerGenerationTool</text>

<rect x="650" y="310" width="220" height="50" class="box"/>
<text x="760" y="340" text-anchor="middle" class="title">CitationTool</text>

<rect x="920" y="130" width="220" height="50" class="box"/>
<text x="1030" y="160" text-anchor="middle" class="title">KMS 服务接口</text>

<line x1="270" y1="80" x2="320" y2="80" class="arrow" marker-end="url(#arrow)"/>
<line x1="540" y1="80" x2="650" y2="80" class="arrow" marker-end="url(#arrow)"/>
<line x1="760" y1="180" x2="920" y2="155" class="arrow" marker-end="url(#arrow)"/>

<line x1="760" y1="180" x2="760" y2="430" class="arrow" marker-end="url(#arrow)"/>

<rect x="100" y="440" width="200" height="50" class="box"/>
<text x="200" y="470" text-anchor="middle" class="title">证据集 Evidence</text>

<rect x="320" y="440" width="200" height="50" class="box"/>
<text x="420" y="470" text-anchor="middle" class="title">EvidencePreprocessor</text>

<rect x="540" y="440" width="200" height="50" class="box"/>
<text x="640" y="470" text-anchor="middle" class="title">推理引擎 core/reasoning/engine.py</text>

<rect x="760" y="440" width="200" height="50" class="box"/>
<text x="860" y="470" text-anchor="middle" class="title">答案抽取 AnswerExtractor</text>

<rect x="980" y="440" width="200" height="50" class="box"/>
<text x="1080" y="470" text-anchor="middle" class="title">答案验证 AnswerValidator</text>

<rect x="1200" y="440" width="200" height="50" class="box"/>
<text x="1300" y="470" text-anchor="middle" class="title">引用 Citation</text>

<rect x="1420" y="440" width="120" height="50" class="box"/>
