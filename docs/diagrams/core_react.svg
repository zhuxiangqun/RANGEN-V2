<line x1="760" y1="430" x2="640" y2="430" class="arrow" marker-end="url(#arrow)"/>
<line x1="300" y1="465" x2="320" y2="465" class="arrow" marker-end="url(#arrow)"/>
<line x1="520" y1="465" x2="540" y2="465" class="arrow" marker-end="url(#arrow)"/>
<line x1="740" y1="465" x2="760" y2="465" class="arrow" marker-end="url(#arrow)"/>
<line x1="960" y1="465" x2="980" y2="465" class="arrow" marker-end="url(#arrow)"/>
<line x1="1180" y1="465" x2="1200" y2="465" class="arrow" marker-end="url(#arrow)"/>
<line x1="1400" y1="465" x2="1420" y2="465" class="arrow" marker-end="url(#arrow)"/>
</svg>
